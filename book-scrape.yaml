vault:
  root: /vault
  inbox: book-inbox
  seen_file: seen-book-urls.json

scrape:
  interval: 168h   # 週1回
  user_agent: philosophy-book-scraper/0.1 (+https://github.com/jedipunkz/philosophy)
  max_results: 5
  max_book_chars: 300000   # public domain 書籍本文・百科事典本文の最大文字数（rune 数）
  max_book_bytes: 10485760 # ダウンロード上限（10 MiB）
  request_timeout: 60s
  request_delay: 2s
  refresh_existing: true

sources:
  - name: wikipedia_ja
    enabled: true
    type: wikipedia_api
    base_url: https://ja.wikipedia.org
    search_url: https://ja.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch={query}&gsrlimit=5&prop=extracts&explaintext=1&exlimit=max&format=json&formatversion=2

  - name: sep
    enabled: true
    type: sep_html
    base_url: https://plato.stanford.edu
    search_url: https://plato.stanford.edu/search/searcher.py?query={query}

  - name: gutenberg
    enabled: true
    type: gutenberg_api
    base_url: https://gutendex.com
    search_url: https://gutendex.com/books/?search={query}

keywords:
  - name: カント
    queries:
      - Immanuel Kant
      - イマヌエル・カント
      - 純粋理性批判
      - Critique of Pure Reason
      - 実践理性批判
      - Critique of Practical Reason
    sources:
      - wikipedia_ja
      - sep
      - gutenberg
    tags:
      - 近代哲学
      - 認識論
      - 倫理学

  - name: プラトン
    queries:
      - Plato
      - プラトン
      - 国家 プラトン
      - Plato Republic
      - Plato Symposium
    sources:
      - wikipedia_ja
      - sep
      - gutenberg
    tags:
      - 古代哲学
      - イデア論
      - 倫理学

  - name: アリストテレス
    queries:
      - Aristotle
      - アリストテレス
      - ニコマコス倫理学
      - Aristotle Nicomachean Ethics
      - Aristotle Politics
    sources:
      - wikipedia_ja
      - sep
      - gutenberg
    tags:
      - 古代哲学
      - 倫理学
      - 形而上学

  - name: ニーチェ
    queries:
      - Friedrich Nietzsche
      - フリードリヒ・ニーチェ
      - ツァラトゥストラはこう語った
      - Nietzsche Thus Spoke Zarathustra
      - Nietzsche Beyond Good and Evil
    sources:
      - wikipedia_ja
      - sep
      - gutenberg
    tags:
      - 近代哲学
      - 実存主義
      - ニヒリズム

  - name: ヘーゲル
    queries:
      - Hegel
      - ヘーゲル
      - 精神現象学
      - Hegel Phenomenology of Spirit
    sources:
      - wikipedia_ja
      - sep
      - gutenberg
    tags:
      - 近代哲学
      - 弁証法
      - 観念論

  - name: マルクス
    queries:
      - Karl Marx
      - カール・マルクス
      - 資本論
      - Karl Marx Capital
      - Communist Manifesto
    sources:
      - wikipedia_ja
      - sep
      - gutenberg
    tags:
      - 近代哲学
      - 社会思想
      - 唯物論

  - name: デカルト
    queries:
      - René Descartes
      - ルネ・デカルト
      - 方法序説
      - Descartes Meditations on First Philosophy
    sources:
      - wikipedia_ja
      - sep
      - gutenberg
    tags:
      - 近代哲学
      - 合理主義
      - 認識論

  - name: スピノザ
    queries:
      - Baruch Spinoza
      - スピノザ
      - エチカ スピノザ
      - Spinoza Ethics
    sources:
      - wikipedia_ja
      - sep
      - gutenberg
    tags:
      - 近代哲学
      - 汎神論
      - 倫理学

  - name: ハンナ・アーレント
    queries:
      - Hannah Arendt
      - ハンナ・アーレント
      - 人間の条件 アーレント
      - 全体主義の起源
    sources:
      - wikipedia_ja
      - sep
    tags:
      - 現代哲学
      - 政治哲学
      - 全体主義

  - name: ユング
    queries:
      - Carl Gustav Jung
      - カール・グスタフ・ユング
      - ユング 元型
      - 集合的無意識
    sources:
      - wikipedia_ja
      - sep
    tags:
      - 現代哲学
      - 深層心理学
      - 元型論
