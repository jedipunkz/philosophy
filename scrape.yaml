vault:
  root: /vault
  inbox: inbox
  seen_file: seen-urls.json

scrape:
  interval: 24h
  user_agent: philosophy-scraper/0.1 (+https://github.com/jedipunkz/philosophy)
  max_results: 12
  max_new_items: 40
  max_pdf_chars: 50000
  max_pdf_bytes: 20971520
  max_book_chars: 300000   # public domain 書籍本文・百科事典本文の最大文字数（rune 数）
  max_book_bytes: 10485760 # 書籍ダウンロード上限（10 MiB）
  request_timeout: 60s
  request_delay: 4s   # arXiv は 3 秒以上の間隔を推奨。429 対策で 2s→4s に引き上げ
  refresh_existing: false

# 論文ソース（Crossref / arXiv）と
# 書籍ソース（Wikipedia ja / SEP / Internet Archive）を 1 ファイルに統合する。
# キーワードごとに sources で使うソースを選択する。
#
# philarchive / gutenberg（gutendex.com）は robots.txt で ClaudeBot を名指しで
# Disallow しており、Cloudflare 側でも GitHub Actions の IP レンジ自体を
# ブロックしていた（User-Agent 変更でも解消せず）。ボット除外を明示している
# サイトを回避策で突破するのは避け、Crossref / Internet Archive に置き換えた。
sources:
  - name: crossref
    enabled: true
    type: crossref_api
    base_url: https://api.crossref.org
    search_url: https://api.crossref.org/works?query={query}&rows=12

  - name: arxiv
    enabled: true
    type: api
    base_url: https://export.arxiv.org/api/query
    search_url: https://export.arxiv.org/api/query?search_query=all:{query}&start=0&max_results=50

  - name: wikipedia_ja
    enabled: true
    type: wikipedia_api
    base_url: https://ja.wikipedia.org
    search_url: https://ja.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch={query}&gsrlimit=5&prop=extracts&explaintext=1&exlimit=max&format=json&formatversion=2

  - name: sep
    enabled: true
    type: sep_html
    base_url: https://plato.stanford.edu
    search_url: https://plato.stanford.edu/search/searcher.py?query={query}

  - name: archive
    enabled: true
    type: archive_api
    base_url: https://archive.org
    search_url: https://archive.org/advancedsearch.php?q={query}+AND+mediatype%3Atexts&rows=12&output=json&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=year&fl[]=access-restricted-item

