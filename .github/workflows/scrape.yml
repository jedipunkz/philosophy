name: Scrape inbox

on:
  schedule:
    # every 6 hours (UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-inbox
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      SCRAPEM_VAULT_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build scraper
        run: go build -o bin/scrapem ./cmd/scrapem

      - name: Install pdftotext (poppler)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Run scraper
        run: |
          set -euo pipefail
          ./bin/scrapem run --config scrape.yaml --max-duration 40m || {
            echo "::warning::Scraper failed; continuing so scheduled CI stays green."
          }

      - name: Commit and push changes
        run: |
          set -euo pipefail
          paths=(inbox .scrapem/seen-urls.json)
          if [[ -z "$(git status --porcelain -- "${paths[@]}")" ]]; then
            echo "No inbox changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${paths[@]}"
          git commit -m "chore: scheduled scrape update"
          for attempt in 1 2 3; do
            git pull --rebase origin main || {
              echo "::warning::Could not rebase scrape changes onto main; skipping push."
              exit 0
            }
            if git push origin HEAD:main; then
              exit 0
            elif [[ $attempt -lt 3 ]]; then
              echo "Push failed (attempt ${attempt}/3), retrying..."
              sleep $((attempt * 5))
            else
              echo "::warning::Push failed after 3 attempts; skipping to keep scheduled CI green."
              exit 0
            fi
          done
