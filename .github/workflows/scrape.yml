name: Scrape inbox

on:
  schedule:
    # every 6 hours (UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-inbox
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build scraper
        run: go build -o bin/scrapem ./cmd/scrapem

      - uses: actions/upload-artifact@v4
        with:
          name: scrapem-binary
          path: bin/scrapem

  scrape-research:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SCRAPEM_VAULT_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          name: scrapem-binary
          path: bin/

      - run: chmod +x bin/scrapem

      - name: Install pdftotext (poppler)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Run research scraper
        run: |
          set -euo pipefail
          ./bin/scrapem run --config research-scrape.yaml --max-duration 38m || {
            echo "::warning::Research scraper failed; continuing so scheduled CI stays green."
          }

      - uses: actions/upload-artifact@v4
        with:
          name: research-changes
          path: |
            research-inbox/
            .scrapem/seen-research-urls.json
          if-no-files-found: ignore

  scrape-book:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SCRAPEM_VAULT_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          name: scrapem-binary
          path: bin/

      - run: chmod +x bin/scrapem

      - name: Run book scraper
        run: |
          set -euo pipefail
          ./bin/scrapem run --config book-scrape.yaml --max-duration 38m || {
            echo "::warning::Book scraper failed; continuing so scheduled CI stays green."
          }

      - uses: actions/upload-artifact@v4
        with:
          name: book-changes
          path: |
            book-inbox/
            .scrapem/seen-book-urls.json
          if-no-files-found: ignore

  push:
    needs: [scrape-research, scrape-book]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/download-artifact@v4
        with:
          name: research-changes
          path: .
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: book-changes
          path: .
        continue-on-error: true

      - name: Commit and push changes
        run: |
          set -euo pipefail
          paths=(research-inbox book-inbox .scrapem/seen-research-urls.json .scrapem/seen-book-urls.json)
          if [[ -z "$(git status --porcelain -- "${paths[@]}")" ]]; then
            echo "No inbox changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${paths[@]}"
          git commit -m "chore: scheduled scrape update"
          git pull --rebase origin main || {
            echo "::warning::Could not rebase scrape changes onto main; skipping push."
            exit 0
          }
          git push origin HEAD:main || {
            echo "::warning::Could not push scrape changes; skipping."
            exit 0
          }
