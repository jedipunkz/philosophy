services:
  research-scraper:
    build:
      context: .
      dockerfile: docker/scraper/Dockerfile
    volumes:
      - .:/vault
    command: ["run", "--config", "/vault/research-scrape.yaml"]
    restart: "no"

  research-scheduler:
    build:
      context: .
      dockerfile: docker/scraper/Dockerfile
    volumes:
      - .:/vault
    command: ["watch", "--config", "/vault/research-scrape.yaml"]
    restart: unless-stopped

  book-scraper:
    build:
      context: .
      dockerfile: docker/scraper/Dockerfile
    volumes:
      - .:/vault
    command: ["run", "--config", "/vault/book-scrape.yaml"]
    restart: "no"

  book-scheduler:
    build:
      context: .
      dockerfile: docker/scraper/Dockerfile
    volumes:
      - .:/vault
    command: ["watch", "--config", "/vault/book-scrape.yaml"]
    restart: unless-stopped
